
name: R-CMD-check

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      # Optional but recommended for packages that need system libs (xml2, curl, openssl, etc.)
      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      # Installs R package dependencies (from DESCRIPTION) and caches them automatically.
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # "check" installs deps needed for R CMD check (Imports, Depends, LinkingTo, Suggests, etc.)
          extra-packages: any::rcmdcheck
          needs: check

      - name: Run R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
