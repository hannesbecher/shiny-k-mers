name: R-CMD-check

on:
  pull_request:

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up R
      uses: r-lib/actions/setup-r@v2

    - name: Install package dependencies
      uses: r-lib/actions/setup-r-dependencies@v2
      with:
        extra-packages: any::testthat
        working-directory: Tetmer

    - name: Install Tetmer package
      working-directory: Tetmer
      run: |
        devtools::install_local()
      shell: Rscript {0}

    - name: Run testthat tests
      working-directory: Tetmer
      run: |
        devtools::test()
      shell: Rscript {0}
